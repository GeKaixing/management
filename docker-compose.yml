services:
  postgres:
    image: postgres:16-alpine
    container_name: management-postgres
    environment:
      POSTGRES_DB: management
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - ./storage_data/postgres:/var/lib/postgresql/data
    restart: unless-stopped

  server:
    build:
      context: .
      dockerfile: docker/Dockerfile.server
    container_name: remote-camera-server
    depends_on:
      - postgres
    environment:
      PORT: 3000
      PG_URL: postgres://postgres:postgres@postgres:5432/management
      CONTROL_PLANE_REQUIRED: "true"
    ports:
      - "3000:3000"
    volumes:
      - ./storage_data:/app/storage_data
    restart: unless-stopped

  dashboard:
    build:
      context: .
      dockerfile: docker/Dockerfile.dashboard
    container_name: remote-camera-dashboard
    depends_on:
      - server
    environment:
      NEXT_PUBLIC_SERVER_URL: http://localhost:3000
    ports:
      - "3001:3001"
    restart: unless-stopped
